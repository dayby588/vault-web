<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识进化系统 — Vault Web 编辑器 v2.7</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <style>
:root, [data-theme="dark"] {
      /* 暗色主题 */
      --bg-app:      #1a1a2e;
      --bg-sidebar:  #16213e;
      --bg-editor:   #1a1a2e;
      --bg-preview:  #0f0f23;
      --bg-toolbar:  #16213e;
      --bg-hover:    rgba(233,69,96,0.12);
      --border:      #0f3460;
      --accent:      #e94560;
      --accent-dim:  #e9456030;
      --text:        #ddd;
      --text-muted:  #6b7280;
      --text-folder: #f39c12;
      --text-link:   #60a5fa;
      --radius:      8px;
      --sidebar-w:   260px;
      --toolbar-h:   48px;
      --preview-bg:  #0f0f23;
      --editor-bg:   #1a1a2e;
      --shadow:       0 20px 60px rgba(0,0,0,0.5);
    }

    [data-theme="simple"] {
      /* 简约明亮主题 */
      --bg-app:      #f5f6f8;
      --bg-sidebar:  #ffffff;
      --bg-editor:   #fafbfd;
      --bg-preview:  #ffffff;
      --bg-toolbar:  #ffffff;
      --bg-hover:    rgba(59,130,246,0.08);
      --border:      #e5e7eb;
      --accent:      #3b82f6;
      --accent-dim:  #3b82f620;
      --text:        #1f2937;
      --text-muted:  #9ca3af;
      --text-folder: #f59e0b;
      --text-link:   #3b82f6;
      --preview-bg:  #ffffff;
      --editor-bg:   #fafbfd;
      --shadow:       0 8px 32px rgba(0,0,0,0.08);
    }

    [data-theme="apple"] {
      /* Apple 主题 */
      --bg-app:      #f5f5f7;
      --bg-sidebar:  #f5f5f7;
      --bg-editor:   #ffffff;
      --bg-preview:  #ffffff;
      --bg-toolbar:  rgba(255,255,255,0.85);
      --bg-hover:    rgba(0,0,0,0.05);
      --border:      #d2d2d7;
      --accent:      #0071e3;
      --accent-dim:  #0071e320;
      --text:        #1d1d1f;
      --text-muted:  #86868b;
      --text-folder: #bf5af2;
      --text-link:   #0071e3;
      --preview-bg:  #ffffff;
      --editor-bg:   #ffffff;
      --shadow:       0 4px 20px rgba(0,0,0,0.06);
    }

    /* 主题增强 */
    [data-theme="simple"] .tree-item.active { background: #3b82f620; color: #3b82f6; }
    [data-theme="simple"] .search-wrap input { background: #f3f4f6; border-color: #d1d5db; color: #1f2937; }
    [data-theme="simple"] .CodeMirror { background: #ffffff !important; color: #374151 !important; }
    [data-theme="simple"] .CodeMirror-gutters { background: #f9fafb !important; border-right: 1px solid #e5e7eb !important; }
    [data-theme="simple"] .CodeMirror-linenumber { color: #9ca3af !important; }
    [data-theme="simple"] .CodeMirror-activeline-background { background: #f3f4f6 !important; }

    [data-theme="apple"] .toolbar { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    [data-theme="apple"] .tree-item.active { background: #0071e320; color: #0071e3; }
    [data-theme="apple"] .search-wrap input { background: rgba(0,0,0,0.04); border-color: #d2d2d7; color: #1d1d1f; }
    [data-theme="apple"] .CodeMirror { background: #ffffff !important; color: #1d1d1f !important; }
    [data-theme="apple"] .CodeMirror-gutters { background: #f5f5f7 !important; border-right: 1px solid #d2d2d7 !important; }
    [data-theme="apple"] .CodeMirror-linenumber { color: #86868b !important; }
    [data-theme="apple"] .CodeMirror-activeline-background { background: rgba(0,113,227,0.04) !important; }
    [data-theme="apple"] .CodeMirror-cursor { border-left-color: #0071e3 !important; }
    [data-theme="apple"] .CodeMirror { font-family: -apple-system, 'SF Pro Text', sans-serif !important; }
    [data-theme="apple"] body { font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif !important; }
    [data-theme="apple"] .sidebar { border-right: 1px solid #d2d2d7; }
    [data-theme="apple"] .btn { border-radius: 6px; }
    [data-theme="apple"] .view-tab { border-radius: 6px; }
    [data-theme="apple"] .modal { border-radius: 14px; }
    [data-theme="apple"] .resize-handle { border-radius: 4px; }
    [data-theme="apple"] .resize-handle-h { border-radius: 4px; }
    [data-theme="apple"] .toast { border-radius: 10px; backdrop-filter: blur(10px); background: rgba(29,29,31,0.72) !important; color: #fff !important; border: none !important; }
    [data-theme="apple"] .modal-overlay { backdrop-filter: blur(4px); }

    /* ── 浮动目录 TOC ── */
    #toc-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--bg-toolbar);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    #toc-btn:hover { background: var(--bg-hover); border-color: var(--accent); color: var(--accent); }
    #toc-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    #toc-panel {
      position: absolute;
      top: 48px;
      right: 16px;
      width: 260px;
      max-height: 60vh;
      background: var(--bg-toolbar);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      z-index: 20;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #toc-panel.show { display: flex; }
    .toc-header {
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #toc-list {
      overflow-y: auto;
      padding: 6px 0;
    }
    .toc-item {
      display: block;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.1s, color 0.1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
      line-height: 1.4;
    }
    .toc-item:hover { background: var(--bg-hover); color: var(--accent); }
    .toc-item.level-2 { padding-left: 26px; font-size: 12px; color: var(--text-muted); }
    .toc-item.level-3 { padding-left: 38px; font-size: 12px; color: var(--text-muted); }
    .toc-empty {
      padding: 14px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-app);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶部工具栏 ── */
    .toolbar {
      height: var(--toolbar-h);
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
      z-index: 10;
    }

    .toolbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--accent);
      padding-right: 12px;
      border-right: 1px solid var(--border);
      margin-right: 4px;
    }

    .toolbar-brand svg { color: var(--accent); }

    .toolbar-actions { display: flex; align-items: center; gap: 4px; flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      color: var(--text);
      background: transparent;
    }
    .btn:hover { background: var(--bg-hover); }
    .btn.active { background: var(--accent); color: #fff; }
    .btn svg { width: 14px; height: 14px; }
    .btn.danger:hover { background: rgba(239,68,68,0.2); color: #ef4444; }
    .btn.success:hover { background: rgba(34,197,94,0.15); color: #22c55e; }

    /* 搜索框 */
    .search-wrap {
      position: relative;
      margin-left: auto;
    }
    .search-wrap input {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px 6px 32px;
      font-size: 13px;
      color: var(--text);
      width: 220px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, width 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); width: 280px; }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap svg {
      position: absolute; left: 8px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); width: 14px; height: 14px;
    }

    /* ── 主布局 ── */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── 侧边栏 ── */
    .sidebar {
      width: var(--sidebar-w, 260px);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      min-width: 0;
    }

    .sidebar-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sidebar-header span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .file-tree {
      flex: 1;
      padding: 6px;
      display: flex;
      flex-direction: column;
      overflow-x: auto;
      overflow-y: auto;
    }
    .file-tree::-webkit-scrollbar { width: 10px; height: 10px; }
    .file-tree::-webkit-scrollbar-track { background: var(--bg-sidebar); }
    .file-tree::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
    .file-tree::-webkit-scrollbar-corner { background: var(--bg-sidebar); }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      overflow-x: visible;
      transition: background 0.1s;
      border: none;
      background: none;
      text-align: left;
      font-family: inherit;
    }
    .tree-item:hover { background: var(--bg-hover); }
    .tree-item.active { background: var(--accent-dim); color: var(--accent); }
    .tree-item svg { width: 14px; height: 14px; flex-shrink: 0; color: var(--text-muted); }
    .tree-item.folder svg { color: var(--text-folder); }
    .tree-item span { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }

    .tree-children { padding-left: 16px; }
    /* ── 编辑区 ── */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* 视图切换标签 */
    .view-tabs {
      display: flex;
      gap: 2px;
      padding: 8px 16px;
      background: var(--bg-editor);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      background: none;
      border: none;
      font-family: inherit;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); background: var(--bg-hover); }
    .view-tab.active { color: var(--accent); background: var(--accent-dim); }

    /* ── 视图容器 ── */
    .panes {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .pane-editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .pane-preview {
      overflow-y: auto;
      padding: 24px 36px;
      background: var(--bg-preview);
      min-width: 0;
      display: none;
    }
    .pane-preview.active { display: block; }

    /* ── 四种视图布局 ── */
    /* 纯编辑 */
    .view-edit .pane-editor { flex: 1; display: flex; flex-direction: column; }
    .view-edit .pane-preview { display: none; }

    /* 纯预览 */
    .view-preview .pane-editor { display: none; }
    .view-preview .pane-preview { flex: 1; display: block; }

    /* 水平双栏：编辑左 | 预览右 */
    .view-split .panes { flex-direction: row; }
    .view-split .pane-editor { flex: 1; }
    .view-split .pane-preview { flex: 1; display: block; }

    /* 垂直双栏：预览上 | 编辑下 */
    .view-vertical .panes { flex-direction: column; }
    .view-vertical .pane-preview { flex: 1; display: block; min-height: 0; }
    .view-vertical .pane-editor { flex: 1; min-height: 0; }

    /* 拖拽分隔条 */
    .resize-handle {
      width: 6px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
      border-radius: 3px;
      margin: 0 2px;
    }
    .resize-handle:hover, .resize-handle.dragging {
      background: var(--accent);
    }
    .resize-handle-h {
      width: 100%;
      height: 6px;
      background: var(--border);
      cursor: row-resize;
      flex-shrink: 0;
      transition: background 0.2s;
      border-radius: 3px;
      margin: 2px 0;
    }
    .resize-handle-h:hover, .resize-handle-h.dragging {
      background: var(--accent);
    }

    /* 侧边栏垂直拖拽条 */
    .resize-handle-v {
      width: 6px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background 0.2s;
      border-radius: 3px;
      margin: 0;
    }
    .resize-handle-v:hover, .resize-handle-v.dragging {
      background: var(--accent);
    }

    /* CodeMirror 覆盖 */
    .pane-editor .CodeMirror {
      flex: 1;
      height: 100% !important;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      background: var(--bg-editor);
      color: var(--text);
    }
    .pane-editor .CodeMirror-gutters {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
    }
    .pane-editor .CodeMirror-linenumber { color: var(--text-muted); }
    .pane-editor .CodeMirror-cursor { border-left-color: var(--accent); }
    .pane-editor .CodeMirror-selected { background: var(--accent-dim) !important; }
    .pane-editor .CodeMirror-activeline-background { background: rgba(233,69,96,0.05); }

    /* ── Markdown 预览样式 ── */
    .preview-content { max-width: 780px; margin: 0 auto; }

    .preview-content h1 {
      font-size: 26px; font-weight: 700; color: var(--accent);
      margin: 0 0 20px; padding-bottom: 12px;
      border-bottom: 2px solid var(--accent-dim);
    }
    .preview-content h2 {
      font-size: 20px; font-weight: 600; color: var(--accent);
      margin: 28px 0 12px;
    }
    .preview-content h3 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; }
    .preview-content h4 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; }

    .preview-content p { margin: 12px 0; line-height: 1.8; }
    .preview-content a { color: var(--text-link); text-decoration: none; }
    .preview-content a:hover { text-decoration: underline; }

    .preview-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: rgba(128,128,128,0.12);
      padding: 2px 6px;
      border-radius: 4px;
      color: #e94560;
    }
    .preview-content pre {
      background: rgba(128,128,128,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
    }
    .preview-content pre code { background: none; padding: 0; color: #e94560; font-size: 13px; }

    .preview-content blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 16px;
      margin: 16px 0;
      background: rgba(233,69,96,0.06);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: var(--text-muted);
    }
    .preview-content blockquote p { color: var(--text-muted); margin: 4px 0; }

    .preview-content ul, .preview-content ol {
      padding-left: 24px; margin: 10px 0;
    }
    .preview-content li { margin: 4px 0; line-height: 1.7; }

    .preview-content table {
      border-collapse: collapse; width: 100%; margin: 16px 0;
      font-size: 14px;
    }
    .preview-content th, .preview-content td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .preview-content th { background: var(--bg-sidebar); color: var(--accent); font-weight: 600; }
    .preview-content tr:hover td { background: var(--bg-hover); }

    .preview-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .preview-content img { max-width: 100%; border-radius: var(--radius); }

    .preview-content .task-list-item { list-style: none; margin-left: -20px; }
    .preview-content .task-list-item input { margin-right: 6px; }

    /* callout */
    .preview-content blockquote:has(> p:first-child:contains("> ")) {
      border-left-color: #60a5fa;
    }

    /* ── 空状态 ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* ── Toast 通知 ── */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg-toolbar);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: #22c55e; color: #22c55e; }
    .toast.error { border-color: #ef4444; color: #ef4444; }
    .toast svg { width: 16px; height: 16px; }

    /* ── 新建文件弹窗 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--bg-toolbar);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h3 { font-size: 15px; margin-bottom: 16px; color: var(--text); }
    .modal input {
      width: 100%; padding: 9px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text); font-size: 13px;
      font-family: inherit; outline: none;
      margin-bottom: 12px;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal .btn.primary { background: var(--accent); color: #fff; }
    .modal .btn.primary:hover { background: #d63d56; }

    /* ── 搜索结果面板 ── */
    .search-results {
      position: absolute;
      top: calc(var(--toolbar-h) + 8px);
      right: 12px;
      width: 400px;
      max-height: 60vh;
      background: var(--bg-toolbar);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-y: auto;
      z-index: 50;
      display: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .search-results.show { display: block; }
    .search-results-header {
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--bg-toolbar);
    }
    .search-item {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
    }
    .search-item:hover { background: var(--bg-hover); }
    .search-item:last-child { border-bottom: none; }
    .search-item-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .search-item-snippet { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-item-path { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── 当前文件信息 ── */
    .file-info {
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-muted);
      border-left: 1px solid var(--border);
      margin-left: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── 滚动条 ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* 隐藏 CodeMirror 的默认提示 */
    .CodeMirror pre.CodeMirror-placeholder { color: var(--text-muted); }

    /* ── 主题按钮组 ── */
    .theme-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
      background: rgba(255,255,255,0.05);
    }
    .theme-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }
    .theme-btn.active {
      background: rgba(255,255,255,0.15);
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }
    [data-theme="simple"] .theme-btn,
    [data-theme="apple"] .theme-btn {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.1);
      color: var(--text-secondary);
    }
    [data-theme="simple"] .theme-btn:hover,
    [data-theme="apple"] .theme-btn:hover {
      background: rgba(0,0,0,0.08);
      border-color: rgba(0,0,0,0.18);
    }
    [data-theme="simple"] .theme-btn.active,
    [data-theme="apple"] .theme-btn.active {
      background: rgba(0,0,0,0.08);
      border-color: var(--accent);
    }
    .theme-btn .theme-label {
      color: var(--text-secondary);
    }
    .theme-btn.active .theme-label { color: var(--text); }

    .theme-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: block;
      flex-shrink: 0;
    }
    /* ── 搜索范围 tab ── */
    #search-scope-wrap {
      display: flex; gap: 4px; flex-shrink: 0;
    }
    .search-scope {
      display: flex; gap: 4px; padding: 6px 8px 2px;
      border-bottom: 1px solid var(--border);
    }
    .scope-tab {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: none;
      color: var(--text-muted); cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .scope-tab.active {
      background: var(--accent-dim); color: var(--accent);
      border-color: var(--accent);
    }

    /* ── CodeMirror 查找对话框主题 ── */
    .CodeMirror-dialog {
      background: var(--bg-toolbar) !important;
      border-bottom: 1px solid var(--accent) !important;

      padding: 2px 8px !important; cursor: pointer !important; font-size: 12px !important;
    }
    .CodeMirror-search-hint { color: var(--text-muted) !important; font-size: 11px !important; }

    /* ── 同步滚动按钮 ── */
    #btn-sync-scroll {
      font-size: 11px; padding: 4px 8px;
      opacity: 0.5; border-left: 1px solid var(--border); margin-left: 4px;
      transition: opacity 0.15s, color 0.15s;
    }

    /* ── 侧边栏底部固定横向滚动条 ── */
    .sidebar-hscroll {
      height: 10px; overflow-x: auto; overflow-y: hidden;
      flex-shrink: 0;
    }

    .sidebar-hscroll::-webkit-scrollbar-track { background: var(--bg-sidebar); }
    .sidebar-hscroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .sidebar-hscroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    #sidebar-hscroll-inner { height: 1px; }

    /* ── 右键上下文菜单 ── */
    #ctx-menu {
      position: fixed; z-index: 8000;
      background: var(--bg-sidebar);

      width: 100%; text-align: left; font-family: inherit;
      transition: background 0.1s;
    }
    .ctx-item:hover { background: var(--bg-hover); color: var(--accent); }

    /* ── 登录遮罩 ── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0d0d1a;
      display: flex; align-items: center; justify-content: center;
    }
    #login-overlay.hidden { display: none; }
    .login-box {
      width: 360px;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; gap: 24px;

    .login-logo {

    .login-logo-icon {

    var overlay = document.getElementById('login-overlay');
    var errEl   = document.getElementById('login-error');
    var remoteUser = 'admin'; // 默认值，等待 /api/config 返回后更新
    var remotePass = '';      // 不暴露在客户端，服务端校验

    // 从服务端获取用户名，动态显示提示
    fetch('/api/config')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.username) {
          remoteUser = d.username;
          var userInput = document.getElementById('login-user');
          if (userInput) userInput.placeholder = remoteUser;
        }
      })
      .catch(function() {});

    if (sessionStorage.getItem('vault_auth') === '1') {
      overlay.classList.add('hidden');
    }
    function doLogin() {
      var u = document.getElementById('login-user').value.trim();
      var p = document.getElementById('login-pass').value;
      if (u === remoteUser && p.length > 0) {
        sessionStorage.setItem('vault_auth', '1');
        overlay.classList.add('hidden');
      } else {
        errEl.textContent = '账号或密码错误，请重试';
        document.getElementById('login-pass').value = '';
        document.getElementById('login-pass').focus();
      }
    }
    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('login-pass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('login-user').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('login-pass').focus();
    });
  })();
  </script>

  <!-- TOC浮动目录功能 -->
  <script>
  (function() {
    var tocOpen = false;

    function toggleToc() {
      tocOpen = !tocOpen;
      var panel = document.getElementById('toc-panel');
      if (tocOpen) {
        updateToc();
        panel.classList.add('show');
      } else {
        panel.classList.remove('show');
      }
    }

    function updateToc() {
      var list = document.getElementById('toc-list');
      var preview = document.getElementById('preview-content');
      if (!list || !preview) return;
      var headings = preview.querySelectorAll('h1,h2,h3');
      if (headings.length === 0) {
        list.innerHTML = '<div class="toc-empty">无标题</div>';
        return;
      }
      var html = '';
      headings.forEach(function(el) {
        var level = el.tagName.toLowerCase();
        var text = el.textContent || '';
        var id = el.id || '';
        if (id) {
          html += '<button class="toc-item level-' + (level === 'h1' ? '1' : level === 'h2' ? '2' : '3') + '" onclick="scrollToHeading(\'' + id + '\')">' + escapeHtml(text) + '</button>';
        }
      });
      list.innerHTML = html || '<div class="toc-empty">无标题</div>';
    }

    function scrollToHeading(id) {
      var el = document.getElementById(id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      document.getElementById('toc-panel').classList.remove('show');
      tocOpen = false;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    window.toggleToc = toggleToc;
    window.scrollToHeading = scrollToHeading;

    // 点击外部关闭目录面板
    document.addEventListener('click', function(e) {
      var panel = document.getElementById('toc-panel');
      var btn = document.getElementById('toc-btn');
      if (panel && btn && tocOpen && !panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove('show');
        tocOpen = false;
      }
    });
  })();
  </script>
</body>

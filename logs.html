<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运行日志 — 知识进化系统</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column; }
.header { padding: 14px 20px; background: #16161e; border-bottom: 1px solid #313244; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 15px; font-weight: 600; color: #cdd6f4; }
.header-actions { display: flex; gap: 10px; }
button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn-refresh { background: #89b4fa; color: #1e1e2e; }
.btn-refresh:hover { background: #b4befe; }
.btn-clear { background: #f38ba8; color: #1e1e2e; }
.btn-clear:hover { background: #f2cdcd; }
#log-container { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12.5px; line-height: 1.7; }
.log-line { padding: 1px 6px; border-radius: 3px; white-space: pre-wrap; word-break: break-all; }
.log-line.error { background: rgba(243,139,168,0.12); color: #f38ba8; }
.log-line.warning { background: rgba(249,226,175,0.1); color: #f9e2af; }
.log-line.info { color: #a6e3a1; }
.log-line.debug { color: #6c7086; }
.log-line .ts { color: #585b70; margin-right: 8px; }
.log-line .level { margin-right: 8px; font-weight: 600; }
.log-line .level.ERROR { color: #f38ba8; }
.log-line .level.WARNING { color: #f9e2af; }
.log-line .level.INFO { color: #89b4fa; }
.log-line .level.DEBUG { color: #6c7086; }
#status { padding: 8px 16px; font-size: 12px; color: #585b70; background: #13131a; border-top: 1px solid #1e1e2e; }
#log-container::-webkit-scrollbar { width: 6px; }
#log-container::-webkit-scrollbar-track { background: transparent; }
#log-container::-webkit-scrollbar-thumb { background: #313244; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">📋 运行日志 — 知识进化系统</span>
  <div class="header-actions">
    <button class="btn-refresh" onclick="loadLogs()">🔄 刷新</button>
    <button class="btn-clear" onclick="clearLogs()">🗑 清空</button>
  </div>
</div>

<div id="log-container"></div>
<div id="status"></div>

<script>
const container = document.getElementById('log-container');
const status = document.getElementById('status');

function getLevelClass(line) {
  if (line.includes(' ERROR') || line.includes(' CRITICAL')) return 'error';
  if (line.includes(' WARNING') || line.includes(' WARN')) return 'warning';
  if (line.includes(' INFO')) return 'info';
  if (line.includes(' DEBUG')) return 'debug';
  return '';
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseLine(line) {
  // Format: "10:23:45 INFO    message"
  const m = line.match(/^(\S+)\s+(ERROR|WARNING|INFO|DEBUG|CRITICAL)?\s+(.*)$/);
  if (m) {
    const ts = `<span class="ts">${m[1]}</span>`;
    const level = m[2] ? `<span class="level ${m[2]}">${m[2].padEnd(7)}</span>` : '';
    return ts + level + escapeHtml(m[3]);
  }
  return escapeHtml(line);
}

async function loadLogs() {
  container.innerHTML = '<div style="padding:20px;color:#6c7086">加载中...</div>';
  try {
    const res = await fetch('/api/logs?n=300');
    const data = await res.json();
    if (!data.ok) {
      container.innerHTML = `<div style="padding:20px;color:#f38ba8">读取失败: ${data.error}</div>`;
      return;
    }
    if (data.lines.length === 0) {
      container.innerHTML = '<div style="padding:20px;color:#6c7086">暂无日志</div>';
      status.textContent = '';
      return;
    }
    container.innerHTML = data.lines.map(line => {
      const cls = getLevelClass(line);
      return `<div class="log-line ${cls}">${parseLine(line)}</div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
    status.textContent = `共 ${data.total} 行，显示最近 ${data.lines.length} 行`;
  } catch(e) {
    container.innerHTML = `<div style="padding:20px;color:#f38ba8">加载失败: ${e.message}</div>`;
  }
}

async function clearLogs() {
  if (!confirm('确定清空所有日志？')) return;
  try {
    const res = await fetch('/api/logs/clear', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      container.innerHTML = '<div style="padding:20px;color:#6c7086">日志已清空</div>';
      status.textContent = '';
    } else {
      alert('清空失败: ' + data.error);
    }
  } catch(e) {
    alert('清空失败: ' + e.message);
  }
}

loadLogs();
</script>
</body>
</html>
